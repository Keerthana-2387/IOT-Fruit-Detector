<!DOCTYPE html>
<html>
<body>
    <div>Teachable Machine + Blynk</div>
    <button type="button" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/kIltfUe4g/";
        const BLYNK_TOKEN = "xjwMcBYmcYtGLywSK6HVQkbw1ce0NVoN";

        let model, webcam, labelContainer, maxPredictions;
        let lastValue = -1;

       async function init() {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true; 
    webcam = new tmImage.Webcam(200, 200, flip); 
    
    // Explicitly wait for setup and then manually trigger play
    await webcam.setup(); 
    
    // Some mobile browsers require this specific call to trigger the prompt
    const playPromise = webcam.play();
    if (playPromise !== undefined) {
        playPromise.then(_ => {
            console.log("Camera started successfully");
        }).catch(error => {
            console.error("Camera failed to start:", error);
            alert("Please enable camera permissions in your browser settings.");
        });
    }

    window.requestAnimationFrame(loop);

    // Ensure the canvas is added to the container
    const container = document.getElementById("webcam-container");
    container.innerHTML = ""; // Clear "Loading..." messages if any
    container.appendChild(webcam.canvas);
    
    // Important for mobile: force the internal video element to play
    webcam.webcam.setAttribute('playsinline', true); 
    webcam.webcam.setAttribute('muted', true);
}

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            let currentValue = prediction[0].probability > 0.9 ? 1 : 0;

            if (currentValue !== lastValue) {
                lastValue = currentValue;
                fetch(https://blynk.cloud/external/api/update?token=${BLYNK_TOKEN}&v1=${currentValue})
                .then(response => console.log("Blynk Updated:", currentValue))
                .catch(err => console.error("Blynk Error:", err));
            }

            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.childNodes[i].innerHTML = 
                    prediction[i].className + ": " + prediction[i].probability.toFixed(2);
            }
        }
    </script>
</body>
</html>
